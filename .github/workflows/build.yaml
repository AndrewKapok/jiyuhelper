name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup MinGW (x64)
        if: matrix.arch == 'x64'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
      
      - name: Setup MinGW (x86)
        if: matrix.arch == 'x86'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x86
      
      - name: Get Version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
            Write-Host "Using tag version: $version"
          } else {
            $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/latest" -Headers @{Authorization = "token $env:GITHUB_TOKEN"} -ErrorAction SilentlyContinue
            if ($latestRelease.tag_name) {
              $currentVersion = $latestRelease.tag_name -replace 'v', ''
              $parts = $currentVersion -split '\.'
              $parts[2] = [int]$parts[2] + 1
              $version = $parts -join '.'
            } else {
              $version = '1.0.0'
            }
            Write-Host "Auto-incremented version: $version"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      
      - name: Configure CMake
        run: cmake -B build -G "MinGW Makefiles"
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Rename with Architecture
        shell: pwsh
        run: |
          $arch = '${{ matrix.arch }}'
          $archSuffix = if ($arch -eq 'x64') { 'win64' } else { 'win32' }
          Get-ChildItem -Path "build" -Filter "*.exe" | ForEach-Object {
            $baseName = $_.BaseName
            $extension = $_.Extension
            $newName = "${baseName}-${archSuffix}${extension}"
            Copy-Item $_.FullName -Destination (Join-Path "build" $newName)
            Write-Host "Created: $newName"
          }
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: build/*-win*.exe
          retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Get Version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/latest" -Headers @{Authorization = "token $env:GITHUB_TOKEN"} -ErrorAction SilentlyContinue
            if ($latestRelease.tag_name) {
              $currentVersion = $latestRelease.tag_name -replace 'v', ''
              $parts = $currentVersion -split '\.'
              $parts[2] = [int]$parts[2] + 1
              $version = $parts -join '.'
            } else {
              $version = '1.0.0'
            }
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Created version: $version"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/build-x64/*.exe
            artifacts/build-x86/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
