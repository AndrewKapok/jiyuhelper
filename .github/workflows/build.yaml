name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt and MinGW
        run: |
          aqt install-qt windows desktop 6.10.2 win64_mingw1310 -O ${{ github.workspace }}\Qt
          aqt install-tool windows desktop tools_mingw qt.tools.win64_mingw1310 -O ${{ github.workspace }}\Qt
          echo "Qt6_DIR=${{ github.workspace }}\Qt\6.10.2\mingw1310_64" >> $env:GITHUB_ENV
          echo "PATH=${{ github.workspace }}\Qt\6.10.2\mingw1310_64\bin;${{ github.workspace }}\Qt\Tools\mingw1310_64\bin;$env:PATH" >> $env:GITHUB_ENV

      - name: install UPX
        run: | 
               iwr -Uri "https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-win64.zip" -OutFile upx.zip
               expand-archive -Path upx.zip -DestinationPath upx -Force
               $upxDir = Get-ChildItem -Path upx -Directory | Select-Object -First 1
               $upxPath = $upxDir.FullName
               echo "PATH=$upxPath;$env:PATH" >> $env:GITHUB_ENV
               upx --version
      
      - name: Build
        run: |
               mkdir build
               cd build
               cmake ..
               cmake --build .

      - name: Package and Clean
        shell: cmd
        run: |
            cd build
            for /d %%i in (*) do (
                if not "%%i" == "JiyuUdpAttack" if not "%%i" == "MemoryErasure" (
                    rd /s /q "%%i"
                )
            )
            cd JiyuUdpAttack
            if exist CMakeFiles rd /s /q CMakeFiles
            if exist juyuudpattack_autogen rd /s /q juyuudpattack_autogen
            if exist cmake_install.cmake del cmake_install.cmake
            cd ..
            mkdir jiyukiller-package
            copy "MemoryErasure\MemoryErasure.exe" "jiyukiller-package\"
            xcopy "JiyuUdpAttack" "jiyukiller-package\JiyuUdpAttack" /s /e /i
            powershell Compress-Archive -Path jiyukiller-package -DestinationPath jiyukiller.zip               

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_id }}
          name: Release v${{ github.run_id }}
          draft: false
          prerelease: false
          files: ./build/jiyukiller.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
